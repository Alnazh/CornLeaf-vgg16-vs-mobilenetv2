<div id="results-stage" class="results-section" hidden>

  <div class="results-heading">
    <div>
      <p class="card-label">Hasil Analisis</p>
      <p class="results-heading-text">Perbandingan prediksi dari dua arsitektur model pada gambar yang sama.</p>
    </div>
    <button id="reset-button" class="btn btn-secondary">Uji Gambar Lain</button>
  </div>

  <div class="analyzed-panel">
    <img id="result-image" class="analyzed-image" alt="Gambar daun yang dianalisis">
    <div class="analyzed-meta">
      <div class="meta-item"><span class="meta-label">Nama File</span><span class="meta-value" id="meta-filename">-</span></div>
      <div class="meta-item"><span class="meta-label">Ukuran File</span><span class="meta-value" id="meta-size">-</span></div>
      <div class="meta-item"><span class="meta-label">Dimensi Asli</span><span class="meta-value" id="meta-dimensions">-</span></div>
      <div class="meta-item"><span class="meta-label">Waktu Analisis</span><span class="meta-value" id="meta-time">-</span></div>
    </div>
  </div>

  <div class="verdict-card">
    <span id="agreement-badge" class="agreement-badge"></span>
    <h2 id="summary-heading" class="result-summary-heading"></h2>
    <p id="summary-note" class="result-summary-note"></p>
  </div>

  <div class="recommendation-card">
    <p class="card-label">Model Mana yang Lebih Bisa Dipercaya?</p>
    <span class="recommendation-winner" id="recommendation-winner"></span>
    <p class="recommendation-body" id="recommendation-body"></p>
  </div>

  <div class="model-results-grid">

    <article class="model-result-card" data-model="vgg16">
      <div class="model-result-header">
        <span class="model-icon">V16</span>
        <div class="model-result-title">
          <h2>VGG16</h2>
          <span class="model-tag">Arsitektur Dalam</span>
        </div>
      </div>
      <p class="predicted-class" id="vgg16-class"></p>
      <p class="confidence" id="vgg16-confidence"></p>
      <div class="prob-bars" id="vgg16-bars"></div>
      <div class="recommendation-box" id="vgg16-recommendation"></div>
    </article>

    <article class="model-result-card" data-model="mobilenetv2">
      <div class="model-result-header">
        <span class="model-icon">MN2</span>
        <div class="model-result-title">
          <h2>MobileNetV2</h2>
          <span class="model-tag">Arsitektur Ringan</span>
        </div>
      </div>
      <p class="predicted-class" id="mobilenetv2-class"></p>
      <p class="confidence" id="mobilenetv2-confidence"></p>
      <div class="prob-bars" id="mobilenetv2-bars"></div>
      <div class="recommendation-box" id="mobilenetv2-recommendation"></div>
    </article>

  </div>

  <div class="reset-row">
    <a href="{{ url_for('evaluasi') }}" class="btn btn-secondary">Lihat Detail Performa Model &rarr;</a>
  </div>

</div>
